name: CI

# Runs on every push and every pull request. A test suite that only runs when
# someone remembers to run it is a test suite that is already broken.
on:
  push:
    branches: [main]
  pull_request:

# A new push to the same branch cancels the previous run - there is no value in
# finishing a check against code that has already been replaced.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  engine:
    name: Engine (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # One failing combination should not hide the results of the others.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      # The engine touches the filesystem constantly - path separators, file
      # modes, atomic rename semantics. Windows and macOS are in the matrix
      # because those are exactly the places that behaviour differs.
      - name: Typecheck
        run: npm run typecheck -w @tessera/core

      - name: Test
        run: npm test -w @tessera/core

  server:
    name: Server
    runs-on: ubuntu-latest

    services:
      # The session tests exercise transaction rollback behaviour, which a
      # mocked client cannot reproduce - so CI runs a real Postgres.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tessera
          POSTGRES_PASSWORD: tessera
          POSTGRES_DB: tessera_test
        ports:
          - 5432:5432
        # Without this the job starts querying before Postgres accepts
        # connections, and fails intermittently for no visible reason.
        options: >-
          --health-cmd "pg_isready -U tessera"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://tessera:tessera@localhost:5432/tessera_test?schema=public
      TEST_DATABASE_URL: postgresql://tessera:tessera@localhost:5432/tessera_test?schema=public
      ACCESS_TOKEN_SECRET: ci-access-secret-that-is-long-enough-to-pass-validation
      REFRESH_TOKEN_SECRET: ci-refresh-secret-that-is-different-and-long-enough
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate -w @tessera/server

      # The server consumes @tessera/core through its published declarations,
      # so core must be compiled before anything typechecks against it. A local
      # checkout usually has a stale dist lying around and hides this; a clean
      # CI checkout does not.
      - name: Build the engine
        run: npm run build -w @tessera/core

      - name: Apply migrations
        run: npx prisma migrate deploy --schema packages/server/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck -w @tessera/server

      - name: Test
        run: npm test -w @tessera/server

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        # The web build resolves types through the workspace, and the server's
        # types depend on generated Prisma output.
        run: npm run db:generate -w @tessera/server

      - name: Build
        run: npm run build -w @tessera/core && npm run build -w @tessera/web

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Fails the build on a known high or critical advisory. Moderate findings
      # are reported but not blocking, because dev-only tooling churns and a
      # permanently red pipeline is one nobody reads.
      - name: Audit
        run: npm audit --audit-level=high
