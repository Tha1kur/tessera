server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Hashed asset filenames change whenever their contents do, so they can be
  # cached indefinitely without ever serving a stale file.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html must never be cached: it is what points at the current asset
  # hashes, and a stale copy pins users to a deleted build.
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # The API lives behind the same origin, which keeps the refresh cookie
  # same-site in production exactly as the Vite proxy does in development.
  location /api/ {
    proxy_pass http://api:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Client-side routing: any unknown path is a React route, not a missing file,
  # so it has to fall through to index.html rather than 404.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
