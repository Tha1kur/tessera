# Render blueprint.
#
# Point Render at this repository and it creates everything below in one go:
# a Postgres database, the API, and the static web client.
#
# Nothing here needs Docker installed locally - Render does the build.

databases:
  - name: tessera-db
    databaseName: tessera
    user: tessera
    plan: free

services:
  # ------------------------------------------------------------------ API ---
  - type: web
    name: tessera-api
    runtime: node
    plan: free
    region: oregon

    # --include=dev is required, not optional. Render sets NODE_ENV=production
    # for the build, and npm then omits devDependencies - which is where
    # typescript and @types/node live. Without this the compiler either is not
    # installed or cannot find its own type definitions.
    buildCommand: >-
      npm ci --include=dev &&
      npm run db:generate -w @tessera/server &&
      npm run build -w @tessera/core &&
      npm run build -w @tessera/server

    # Migrations run before the server starts, so the code can never come up
    # against a schema that has not been applied yet.
    startCommand: >-
      npx prisma migrate deploy --schema packages/server/prisma/schema.prisma &&
      node packages/server/dist/main.js

    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: tessera-db
          property: connectionString

      # generateValue makes Render mint a random secret and keep it. The values
      # are never in this file and never in the repository.
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true

      # Must match the web service's real origin, and is set by hand after the
      # first deploy: Render appends a random suffix when a name is taken, so
      # the hostname cannot be known in advance. Left unset rather than
      # defaulted to something permissive - the server rejects a wildcard
      # origin in production on purpose.
      - key: CORS_ORIGINS
        sync: false

  # ------------------------------------------------------------------ web ---
  - type: web
    name: tessera-web
    runtime: static
    # No `plan` here on purpose: Render's static sites are always free and the
    # schema rejects the key outright. Only the Node service above takes one.

    # Same reason as the API: the build needs devDependencies even though the
    # published output does not.
    buildCommand: >-
      npm ci --include=dev &&
      npm run build -w @tessera/core &&
      npm run build -w @tessera/web

    staticPublishPath: ./packages/web/dist

    # Client-side routing: every unknown path is a React route, not a missing
    # file, so it has to fall through to index.html instead of 404ing.
    routes:
      - type: rewrite
        source: /api/*
        # Proxying the API through the same hostname is what keeps the refresh
        # cookie same-site. Split across two domains, SameSite=strict means the
        # browser never sends it and everyone appears logged out on reload.
        destination: https://tessera-api-ghcl.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /assets/*
        name: Cache-Control
        # Asset filenames contain a content hash, so they can be cached forever.
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        # Never cached: it is what points at the current asset hashes.
        value: no-cache
